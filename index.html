<!doctype html>
<html lang="en">
  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="style.css" rel="stylesheet">
    <title>Login Page</title>
  </head>
  <body>
    <div class="container-fluid text-center w-100">
      <div class="row align-items-start">
        <div class="col-1 column1 vh-100 d-inline-block">
        </div>
        <div class="col-1 column2 vh-100 d-inline-block">
        </div>
        <div class="col-8 column-main vh-100 d-inline-block">
          <img src="RecipeNook.png" height="525px" width="625px" alt="logo">
          <p class="text-center">Sign In.</p>
          <p2 class="text-center">Or create account.</p2>
          <div>
            <form>
              <div class="mb-3 d-flex align-items-center justify-content-center">
                <label for="exampleInputEmail1" class="form-label"></label>
                <input type="email" class="form-control w-50" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
              </div>
              <div class="mb-3 d-flex align-items-center justify-content-center">
                <label for="exampleInputPassword1" class="form-label" ></label>
                <input type="password" class="form-control w-50" id="exampleInputPassword1" placeholder="Password">
              </div>
              <div>
                <button type="button" class="btn btn-lg btn-block btn-custom rounded-pill">Sign In</button>
              </div>
            </form>
          </div>
        </div>
        <div class="col-1 column3 vh-100 d-inline-block">
        </div>
        <div class="col-1 column4 vh-100 d-inline-block">
        </div>
      </div>
  </body>
</html>
